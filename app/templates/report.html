<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Valuation Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
        
        <nav class="navbar navbar-expand-lg bg-dark" data-bs-theme="dark">
            <div class="container">
                
                <a class="navbar-brand fw-bold text-uppercase tracking-wide" href="{{ url_for('home') }}">PricePredictor</a>
                
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link text-light active" aria-current="page" href="{{ url_for('home') }}">Home</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

    <div class="container mt-5 mb-5">
        <div class="card shadow border-0 mx-auto" style="max-width: 700px;">
            
            <div class="card-header bg-success text-white text-center py-4">
                <h2 class="mb-0 fw-bold">Official Valuation Report</h2>
            </div>
            
            <div class="card-body p-4 p-md-5">
                
                <div class="text-center mb-5">
                    <h5 class="text-muted text-uppercase tracking-wider mb-2">Estimated Property Value</h5>
                    <h1 class="display-4 fw-bold text-success">${{ "{:,.2f}".format(result) }}</h1>
                </div>

                <hr class="mb-4">

                <h4 class="mb-4">Property Specifications</h4>
                <div class="row">
                    {% for key, value in details.items() %}
                    <div class="col-6 mb-3">
                        <div class="p-3 bg-light rounded border">
                            <small class="text-muted d-block text-uppercase fw-semibold">{{ key }}</small>
                            <span class="fs-5 fw-medium">{{ value }}</span>
                        </div>
                    </div>
                    {% endfor %}
                </div>

                <div class="mt-5 text-center">
                    <a href="{{ url_for('home') }}" class="btn btn-outline-secondary btn-lg px-5">Evaluate Another Property</a>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
